<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juan Bus Enthusiast Community Social Links</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --hover-color: #7dd3fc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        .profile-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--accent-color);
            margin-bottom: 15px;
            object-fit: cover;
        }

        h1 {
            font-size: 1.5rem;
            margin: 10px 0;
        }

        p {
            opacity: 0.8;
            font-size: 0.9rem;
        }

        .links-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-card {
            background-color: var(--card-bg);
            color: var(--text-color);
            text-decoration: none;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            transition: transform 0.2s, background-color 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .link-card:hover {
            transform: scale(1.03);
            background-color: var(--accent-color);
            color: var(--bg-color);
        }

        .footer {
            margin-top: 50px;
            font-size: 0.8rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <img src="IMG_0900.jpg" alt="Profile Picture" class="profile-pic">
        <h1>Juan Bus Enthusiast Community (JuanBEC)</h1>
        <p>A Philippine Bus Enthusiast Community</p>
    </div>

    <div class="links-container">
         <a href="https://www.facebook.com/JuanBusEC" class="link-card" target="_blank">Facebook Page</a>
        <a href="https://www.facebook.com/groups/411943709539339" class="link-card" target="_blank">Facebook Group</a>
        <a href="https://flickr.com/groups/14883385@N25/" class="link-card" target="_blank">Flickr Forum</a>
        <a href="https://instagram.com/@yourhandle" class="link-card" target="_blank">Instagram</a>
    	<a href="https://youtube.com/@yourhandle" class="link-card" target="_blank">Youtube Channel</a>
        <a href="mailto:contact.juanbec2023@gmail.com" class="link-card">Contact Us</a>

    </div>

    <div class="footer">
        © 2026 Juan Bus Enthusiast Community   •   Made with Github
    </div>

</body>

</html>
